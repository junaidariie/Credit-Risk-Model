name: Credit Risk CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 bandit

    - name: Lint code
      run: |
        flake8 src inference tests app.py advisor_bot.py chatbot_advisor.py

    - name: Run tests
      run: |
        pytest tests/

    - name: Security scan
      run: |
        bandit -r src inference

    - name: Docker build check
      run: |
        docker build -t credit-risk-app .
