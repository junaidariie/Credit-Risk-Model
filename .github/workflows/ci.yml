name: Credit Risk CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 bandit

      - name: Lint
        run: |
          flake8 . --max-line-length=120 --ignore=E402,W391

      - name: Run tests
        run: |
          pytest tests/

      - name: Security scan
        run: |
          bandit -r src inference

      - name: Docker build
        run: |
          docker build -t credit-risk-app .
